; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/3.0.4/esp32-3.0.4.zip
    framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.4/esp32-arduino-libs-3.0.4.zip

lib_deps =
    madhephaestus/ESP32Servo @ 3.0.9
    fastled/FastLED @ ^3.10.3
    h2zero/NimBLE-Arduino @ 2.3.6
    askuric/Simple FOC @ =2.3.5
    simplefoc/SimpleFOCDrivers @ 1.0.9
 